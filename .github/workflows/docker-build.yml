name: Build, Push and Update Helm

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWD }}

      - name: Build Docker Image
        run: |
          docker build -t lokeshdagar/gitops-demo:${{ github.sha }} ./app

      - name: Push Docker Image
        run: |
          docker push lokeshdagar/gitops-demo:${{ github.sha }}

      - name: Update Helm Image Tag
        run: |
          sed -i 's/tag:.*/tag: "'"${GITHUB_SHA}"'"/' helm/gitops-demo/values.yaml

      - name: Commit Updated Helm Chart
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add helm/gitops-demo/values.yaml

          git diff --cached --quiet || git commit -m "Update image tag to ${GITHUB_SHA}"

          git push
